<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>SİYAHI MÜZESİ</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 50px;
    }

    .kart {
      border: 2px solid white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      cursor: pointer;
      transition: 0.3s;
    }

    .kart:hover {
      background: white;
      color: black;
    }

    img {
      width: 400px;
      margin-top: 20px;
      border: 4px solid white;
    }

    #foto {
      display: none;
    }

    video {
      width: 700px;
      display: none;
      margin-top: 20px;
      border: 4px solid white;
    }

    .insta {
      width: 100px;
      border: none;
      transition: 0.3s;
      margin-top: 30px;
    }

    .insta:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <h1>SİYAHI MÜZESİ</h1>

  <div class="kart" onclick="goster('resim.jpg')">
    Havli fotorag
  </div>

<script>

function goster(resim) {

  let eski = document.querySelectorAll(".acilanFoto");

  eski.forEach(f => f.remove());

  let foto = document.createElement("img");

  foto.src = resim;

  foto.className = "acilanFoto";

  foto.style.width = "400px";

  foto.style.marginTop = "20px";

  foto.style.border = "4px solid white";

}

<script>

function goster(resim) {

  let eski = document.querySelectorAll(".acilanFoto");

  eski.forEach(f => f.remove());

  let foto = document.createElement("img");

  foto.src = resim;

  foto.className = "acilanFoto";

  foto.style.width = "400px";

  foto.style.marginTop = "20px";

  foto.style.border = "4px solid white";

  document.body.appendChild(foto);

}

function acVideo(videoDosya) {

  let video = document.getElementById("video");

  let source = document.getElementById("videoSource");

  source.src = videoDosya;

  video.load();

  video.style.display = "block";

  video.play();

}

</script>
